dependencies {
    configurations.configureEach {
        resolutionStrategy {
            force "com.google.protobuf:protobuf-java:${libs.versions.protobuf.asProvider().get()}"
        }
    }

    api project(":xds-validator")
    api project(":xds-pgv-shaded")

    compileOnly libs.protobuf.java
    compileOnly libs.protobuf.java.util
    compileOnly project(":grpc")
    compileOnly libs.protoc.gen.validate

    testImplementation libs.protobuf.java
    testImplementation libs.protobuf.java.util
    testImplementation libs.re2j
}

tasks.withType(JavaCompile).configureEach {
    options.forkOptions.memoryMaximumSize = '1g'
}

tasks.withType(Javadoc).configureEach {
    enabled = false
}

tasks.named('generateProto').configure {
    doLast {
        // Workaround for pgv bugs in generated Java validators:
        // Bug 1: \\\xHH -> \\xHH
        // Bug 2: \\" -> \"
        def pgvDir = file("${project.buildDir}/generated/sources/proto/main/javapgv")
        if (pgvDir.exists()) {
            fileTree(pgvDir).include('**/*.java').each { f ->
                def content = f.text
                def fixed = content.replace("\\" * 3 + "x", "\\" * 2 + "x")
                        .replace("\\" * 2 + '"', "\\" + '"')
                if (fixed != content) {
                    f.text = fixed
                }
            }
        }
    }
}
