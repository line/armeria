name: Periodic Gradle Build Cache Check
on:
  schedule:
    - cron: '0 01 * * 1'

env:
  LC_ALL: "en_US.UTF-8"
  DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

jobs:
  build-cache-check:
    if: github.repository == 'line/armeria'
    runs-on: ubuntu-latest
    steps:
      - id: setup-jdk-25
        name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'zulu'
          java-version: '25'

      - uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/download@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/experiment-1@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          gitRepo: https://github.com/line/armeria.git
          gitBranch: main
          tasks: build
          args: --parallel -Pretry=true -PfailOnPassedAfterRetry=false

      - uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/experiment-3@94c54bdb1e6a57347930c62e9254d2c3e55fd5a5 # actions-stable
        with:
          gitRepo: https://github.com/line/armeria.git
          gitBranch: main
          tasks: build
          args: --parallel -PfailIfNotFullyCacheable=true -Pretry=true -PfailOnPassedAfterRetry=false
